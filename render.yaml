services:
  - type: web
    name: connect-crypto
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_GENAI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
